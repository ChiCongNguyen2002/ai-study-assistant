<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Study Assistant</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }
        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
            font-size: 28px;
        }
        .section {
            margin-bottom: 30px;
        }
        .section h2 {
            font-size: 16px;
            color: #667eea;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }
        input[type="file"],
        input[type="text"] {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            width: 100%;
            transition: all 0.3s;
        }
        button:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        button:active {
            transform: translateY(0);
        }
        button.loading {
            opacity: 0.7;
            cursor: not-allowed;
        }
        .status {
            padding: 15px;
            background: #f0f0f0;
            border-radius: 6px;
            margin-top: 20px;
            font-size: 14px;
            line-height: 1.6;
            border-left: 4px solid #667eea;
        }
        .success {
            background: #d4edda;
            color: #155724;
            border-left-color: #28a745;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            border-left-color: #dc3545;
        }
        .doc-item {
            padding: 12px;
            background: #f9f9f9;
            border-radius: 4px;
            margin-bottom: 8px;
            font-size: 13px;
            border-left: 3px solid #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 AI Study Assistant</h1>

        <div class="section">
            <h2>📤 Upload Documents</h2>
            <input type="file" id="fileInput" accept=".pdf,.docx" />
            <button onclick="uploadDocument()" id="uploadBtn">Upload PDF or DOCX</button>
        </div>

        <div class="section">
            <h2>🔍 Ask Question</h2>
            <input type="text" id="queryInput" placeholder="Hỏi gì về tài liệu?" />
            <button onclick="askQuestion()" id="askBtn">Search & Answer</button>
        </div>

        <div id="results"></div>
    </div>

    <script>
        const API_BASE = '/api';

        async function uploadDocument() {
            const file = document.getElementById('fileInput').files[0];
            if (!file) return alert('Vui lòng chọn file');

            const btn = document.getElementById('uploadBtn');
            btn.classList.add('loading');
            btn.textContent = 'Đang upload...';

            const formData = new FormData();
            formData.append('file', file);

            try {
                const res = await fetch(`${API_BASE}/upload`, {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();

                if (data.status === 'success') {
                    showStatus(`✅ ${file.name} uploaded`, 'success');
                    document.getElementById('fileInput').value = '';
                } else {
                    showStatus(`❌ Lỗi: ${data.message}`, 'error');
                }
            } catch (e) {
                showStatus(`❌ Upload failed: ${e.message}`, 'error');
            } finally {
                btn.classList.remove('loading');
                btn.textContent = 'Upload PDF or DOCX';
            }
        }

        async function askQuestion() {
            const query = document.getElementById('queryInput').value.trim();
            if (!query) return alert('Vui lòng nhập câu hỏi');

            const btn = document.getElementById('askBtn');
            btn.classList.add('loading');
            btn.textContent = 'Thinking...';

            try {
                const res = await fetch(`${API_BASE}/questions`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query })
                });
                const data = await res.json();

                if (data.answer && data.answer !== null) {
                    let html = `<div class="status success">`;
                    html += `<strong>💡 Trả lời:</strong><br>${data.answer}`;
                    if (data.sources && data.sources.length > 0) {
                        html += `<br><br><strong>📚 Nguồn:</strong><br>`;
                        data.sources.forEach(s => {
                            html += `<div class="doc-item">📄 ${s.filename}</div>`;
                        });
                    }
                    html += `</div>`;
                    document.getElementById('results').innerHTML = html;
                } else if (data.error) {
                    showStatus(`❌ Lỗi: ${data.error}`, 'error');
                } else {
                    showStatus(`❌ Unexpected response`, 'error');
                }
            } catch (e) {
                showStatus(`❌ Error: ${e.message}`, 'error');
            } finally {
                btn.classList.remove('loading');
                btn.textContent = 'Search & Answer';
            }
        }

        function showStatus(msg, type) {
            const div = document.createElement('div');
            div.className = `status ${type}`;
            div.textContent = msg;
            document.getElementById('results').innerHTML = '';
            document.getElementById('results').appendChild(div);
        }
    </script>
</body>
</html>
