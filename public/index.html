<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Study Assistant</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }
        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
            font-size: 28px;
        }
        .section {
            margin-bottom: 30px;
        }
        .section h2 {
            font-size: 16px;
            color: #667eea;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }
        .section p.hint {
            font-size: 13px;
            color: #888;
            margin-bottom: 10px;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            width: 100%;
            transition: all 0.3s;
        }
        button.secondary {
            background: #f0f0f0;
            color: #555;
        }
        button:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        button.secondary:hover {
            background: #e2e2e2;
            color: #555;
            box-shadow: none;
        }
        button:active {
            transform: translateY(0);
        }
        button.loading {
            opacity: 0.7;
            cursor: not-allowed;
        }
        .status {
            padding: 15px;
            background: #f0f0f0;
            border-radius: 6px;
            margin-top: 20px;
            font-size: 14px;
            line-height: 1.6;
            border-left: 4px solid #667eea;
        }
        .success {
            background: #d4edda;
            color: #155724;
            border-left-color: #28a745;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            border-left-color: #dc3545;
        }
        .doc-item {
            padding: 12px;
            background: #f9f9f9;
            border-radius: 4px;
            margin-bottom: 8px;
            font-size: 13px;
            border-left: 3px solid #667eea;
        }
        .confidence {
            display: inline-block;
            margin-top: 10px;
            font-size: 12px;
            color: #666;
        }
        .follow-up {
            display: block;
            width: 100%;
            text-align: left;
            background: none;
            border: 1px solid #ddd;
            color: #667eea;
            padding: 8px 12px;
            margin-top: 6px;
            font-weight: 400;
        }
        .follow-up:hover {
            background: #f5f5ff;
            color: #667eea;
            transform: none;
            box-shadow: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 AI Study Assistant</h1>

        <div class="section">
            <h2>📥 Knowledge Base</h2>
            <p class="hint">Reload documents from the server's document folder into the vector store.</p>
            <button class="secondary" onclick="reloadKnowledgeBase()" id="ingestBtn">Reload Knowledge Base</button>
        </div>

        <div class="section">
            <h2>🔍 Ask Question</h2>
            <input type="text" id="queryInput" placeholder="Hỏi gì về tài liệu?" />
            <button onclick="askQuestion()" id="askBtn">Search & Answer</button>
        </div>

        <div id="results"></div>
    </div>

    <script>
        const API_BASE = '/api/chat';

        async function reloadKnowledgeBase() {
            const btn = document.getElementById('ingestBtn');
            btn.classList.add('loading');
            btn.textContent = 'Đang tải...';

            try {
                const res = await fetch(`${API_BASE}/ingest`, { method: 'POST' });
                const data = await res.json();

                if (data.status === 'success' || data.status === 'ok') {
                    const stats = data.result?.vector_db;
                    const total = stats ? stats.total_documents : '?';
                    showStatus(`✅ Knowledge base reloaded (${total} chunks indexed)`, 'success');
                } else {
                    showStatus(`❌ Lỗi: ${data.message || 'Unknown error'}`, 'error');
                }
            } catch (e) {
                showStatus(`❌ Reload failed: ${e.message}`, 'error');
            } finally {
                btn.classList.remove('loading');
                btn.textContent = 'Reload Knowledge Base';
            }
        }

        async function askQuestion(query) {
            query = (query ?? document.getElementById('queryInput').value).trim();
            if (!query) return alert('Vui lòng nhập câu hỏi');
            document.getElementById('queryInput').value = query;

            const btn = document.getElementById('askBtn');
            btn.classList.add('loading');
            btn.textContent = 'Thinking...';

            try {
                const res = await fetch(`${API_BASE}/message`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query })
                });
                const data = await res.json();

                if (data.answer) {
                    let html = `<div class="status success">`;
                    html += `<strong>💡 Trả lời:</strong><br>${data.answer}`;
                    html += `<div class="confidence">Confidence: ${Math.round(data.confidence * 100)}%</div>`;
                    if (data.sources && data.sources.length > 0) {
                        html += `<br><strong>📚 Nguồn:</strong><br>`;
                        data.sources.forEach(s => {
                            html += `<div class="doc-item">📄 ${s.source} (Page ${s.page}, ${s.similarity}%)</div>`;
                        });
                    }
                    html += `</div>`;
                    if (data.follow_up_questions && data.follow_up_questions.length > 0) {
                        html += `<div class="status"><strong>➡️ Câu hỏi liên quan:</strong>`;
                        data.follow_up_questions.forEach(q => {
                            html += `<button class="follow-up" onclick="askQuestion(${JSON.stringify(q)})">${q}</button>`;
                        });
                        html += `</div>`;
                    }
                    document.getElementById('results').innerHTML = html;
                } else if (data.error) {
                    showStatus(`❌ Lỗi: ${data.error}`, 'error');
                } else {
                    showStatus(`❌ Unexpected response`, 'error');
                }
            } catch (e) {
                showStatus(`❌ Error: ${e.message}`, 'error');
            } finally {
                btn.classList.remove('loading');
                btn.textContent = 'Search & Answer';
            }
        }

        function showStatus(msg, type) {
            const div = document.createElement('div');
            div.className = `status ${type}`;
            div.textContent = msg;
            document.getElementById('results').innerHTML = '';
            document.getElementById('results').appendChild(div);
        }
    </script>
</body>
</html>
